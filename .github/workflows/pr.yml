name: Check PR status

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: ./package.json
          cache: pnpm

      - name: Install dependencies
        run: pnpm i

      - name: Check linting
        run: pnpm run lint

      - name: build
        env:
          BASE_PATH: '/globe-game'
        run: |
          pnpm run build
